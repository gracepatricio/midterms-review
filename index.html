<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Commerce Midterm Quiz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    background: white;
    width: 500px;
    max-width: 100%;
    padding: 28px 24px 20px;
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    text-align: center;
}

#progress {
    font-size: 13px;
    color: #888;
    margin-bottom: 6px;
}

.progress-bar-wrap {
    background: #eee;
    border-radius: 20px;
    height: 7px;
    margin-bottom: 14px;
    overflow: hidden;
}

.progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 20px;
    transition: width 0.3s;
}

#question {
    font-size: 15px;
    font-weight: bold;
    color: #333;
    margin-bottom: 16px;
    line-height: 1.5;
    min-height: 60px;
    text-align: left;
}

.option {
    background: #f0f0f0;
    padding: 11px 14px;
    margin: 7px 0;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    font-size: 14px;
    transition: background 0.15s, transform 0.1s;
    border: 2px solid transparent;
}

.option:hover:not(.correct):not(.wrong) {
    background: #e0e0ff;
    border-color: #667eea;
    transform: translateX(2px);
}

.correct { background: #4CAF50 !important; color: white; border-color: #388e3c !important; }
.wrong   { background: #f44336 !important; color: white; border-color: #c62828 !important; }

#score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 14px 0 8px;
    font-size: 13px;
    color: #555;
}

.nav-btns {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
}

button {
    padding: 9px 18px;
    border: none;
    background: #667eea;
    color: white;
    border-radius: 7px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
}

button:hover { background: #5567d0; }
button.secondary { background: #aaa; }
button.secondary:hover { background: #888; }

.hidden { display: none; }

#result {
    text-align: center;
    padding: 10px;
}

#result h2 { font-size: 26px; margin-bottom: 10px; }
#result p  { font-size: 16px; color: #555; margin-bottom: 6px; }
.grade-display {
    font-size: 52px;
    font-weight: bold;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 10px 0;
}

.mode-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
</style>
</head>
<body>

<div class="container">

<div id="quiz">
    <div id="progress"></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="pbar"></div></div>
    <h3 id="question"></h3>
    <div id="options"></div>
    <div id="score-row">
        <span id="score">Score: 0</span>
        <span id="streak"></span>
    </div>
    <div class="nav-btns">
        <button class="secondary" onclick="prev()">&#8592; Prev</button>
        <button onclick="next()">Next &#8594;</button>
    </div>
</div>

<div id="result" class="hidden">
    <h2>Quiz Complete! 🎉</h2>
    <div class="grade-display" id="percent-display"></div>
    <p id="final"></p>
    <p id="remark"></p>
    <div class="mode-btns">
        <button onclick="restart()">Try Again</button>
        <button class="secondary" onclick="reviewMode()">Review Answers</button>
    </div>
</div>

</div>

];

let current = 0, score = 0;
let answered = new Array(quizData.length).fill(null); // null=unanswered, true=correct, false=wrong

function load() {
    let q = quizData[current];
    document.getElementById("question").innerText = `Q${current+1}. ${q.q}`;
    document.getElementById("progress").innerText = `Question ${current+1} of ${quizData.length}`;
    document.getElementById("score").innerText = `Score: ${score}`;
    document.getElementById("pbar").style.width = `${Math.round((current+1)/quizData.length*100)}%`;

    let html = "";
    q.o.forEach((opt, i) => {
        let cls = "";
        if (answered[current] !== null) {
            if (i === q.a) cls = "correct";
            else if (i === answered[current] && answered[current] !== q.a) cls = "wrong";
        }
        html += `<div class="option ${cls}" onclick="select(${i})">${opt}</div>`;
    });
    document.getElementById("options").innerHTML = html;

    const correctCount = answered.filter(v => v !== null && quizData[answered.indexOf(v)]);
    document.getElementById("streak").innerText = `Answered: ${answered.filter(v => v !== null).length}/${quizData.length}`;
}

function select(i) {
    if (answered[current] !== null) return;
    answered[current] = i;

    let correct = quizData[current].a;
    let opts = document.querySelectorAll(".option");
    opts.forEach((el, idx) => {
        if (idx === correct) el.classList.add("correct");
        if (idx === i && i !== correct) el.classList.add("wrong");
    });

    if (i === correct) score++;
    document.getElementById("score").innerText = `Score: ${score}`;

    if (answered.every(v => v !== null)) {
        setTimeout(showResult, 600);
    }
}

function next() {
    if (current === quizData.length - 1) return showResult();
    current++;
    load();
}

function prev() {
    if (current === 0) return;
    current--;
    load();
}

function showResult() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
    let pct = Math.round(score / quizData.length * 100);
    document.getElementById("percent-display").innerText = pct + "%";
    document.getElementById("final").innerText = `${score} out of ${quizData.length} correct`;
    let remark = pct >= 90 ? "Outstanding! 🌟" : pct >= 75 ? "Great job! 👍" : pct >= 60 ? "Keep practicing! 📚" : "Study more and try again! 💪";
    document.getElementById("remark").innerText = remark;
}

function restart() {
    current = 0; score = 0;
    answered = new Array(quizData.length).fill(null);
    document.getElementById("quiz").classList.remove("hidden");
    document.getElementById("result").classList.add("hidden");
    load();
}

function reviewMode() {
    current = 0;
    document.getElementById("quiz").classList.remove("hidden");
    document.getElementById("result").classList.add("hidden");
    // Mark all unanswered as revealed
    answered = answered.map((v, i) => v === null ? -1 : v);
    load();
}

load();
</script>

</body>
</html>
